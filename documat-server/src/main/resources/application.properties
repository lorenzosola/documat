# Server Configuration
server.port=8080
spring.application.name=documat-server

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/documat_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
documat.upload.dir=./uploads

# JWT Configuration
documat.jwt.secret=ZG9jdW1lbnRNYW5hZ2VtZW50U3lzdGVtU2VjcmV0S2V5Rm9ySlRUb2tlbkdlbmVyYXRpb24xMjM0NTY3ODk=
documat.jwt.expirationMs=86400000

# Logging
logging.level.com.documat=DEBUG
logging.level.org.springframework.security=DEBUG

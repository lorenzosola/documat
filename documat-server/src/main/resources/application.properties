# Server Configuration
server.port=8080
spring.application.name=documat-server

# MySQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/documat_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
documat.upload.dir=${UPLOAD_DIR:./uploads}

# JWT Configuration
documat.jwt.secret=${JWT_SECRET:ZG9jdW1lbnRNYW5hZ2VtZW50U3lzdGVtU2VjcmV0S2V5Rm9ySlRUb2tlbkdlbmVyYXRpb24xMjM0NTY3ODk=}
documat.jwt.expirationMs=${JWT_EXPIRATION:86400000}

# Allowed Origins for CORS
documat.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}

# Logging
logging.level.com.documat=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}

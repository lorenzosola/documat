# H2 in-memory database (MySQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT – secret is the Base64 encoding of a 64-char key (>=512 bits for HS512, >=256 bits for HS256)
documat.jwt.secret=dGVzdFNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbkluVGVzdHMxMjM0NTY3ODk=
documat.jwt.expirationMs=3600000

# Uploads stored in a temp directory during tests
documat.upload.dir=${java.io.tmpdir}/documat-test-uploads

# CORS
documat.cors.allowed-origins=http://localhost:3000

logging.level.root=WARN
logging.level.com.documat=WARN
